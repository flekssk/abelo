services:
    nginx:
        image: nginx:alpine
        ports:
            - "22771:80"
            - "22772:443"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./docker/nginx/cert:/etc/nginx/cert:ro
            - ./docker/nginx/pwd/.htpasswd:/etc/nginx/.htpasswd:ro
        environment:
            - TZ=Europe/Moscow
        networks:
            - common
    mysql:
        image: mysql:8
        platform: linux/amd64
        ports:
            - "33062:3306"
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: abelo_test
            MYSQL_USER: abelo
            MYSQL_PASSWORD: password
            TZ: Europe/Moscow
        volumes:
            - mysql:/var/lib/mysql
        networks:
            - common

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: api
        working_dir: /var/www/html
        ports:
            - "${PHP_PORT:-9000}:9000"
        volumes:
            - ./:/var/www/html
        networks:
            - common
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            - redis
        environment:
            APP_ENV: "local"
            TZ: Europe/Moscow

    redis:
        image: redis:alpine
        volumes:
            - redis_data:/data
        networks:
            - common
        environment:
            TZ: Europe/Moscow

volumes:
    mysql:
    redis_data:

networks:
    common:
        driver: bridge
